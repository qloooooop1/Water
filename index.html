<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تتبع شرب الماء</title>
  <style>
    :root {
      --primary: #2196f3;
      --primary-dark: #1976d2;
      --success: #4caf50;
      --danger: #ff5252;
    }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #bbdefb);
      min-height: 100vh;
      margin: 0;
      padding: 15px;
      color: #333;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: var(--primary);
      color: white;
      padding: 25px 20px;
      text-align: center;
    }
    h1 { margin: 0 0 15px; font-size: 1.8rem; }
    .progress-circle {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 15px auto;
    }
    .progress-circle svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    circle { fill: none; stroke-width: 12; }
    .bg { stroke: rgba(255,255,255,0.3); }
    .progress { stroke: white; stroke-linecap: round; transition: stroke-dashoffset 0.4s; }
    .percentage {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.5rem;
      font-weight: bold;
    }
    .current-drunk {
      font-size: 1.4rem;
      margin: 10px 0 20px;
      font-weight: bold;
    }
    .current-drunk .liters { font-size: 2rem; }
    .content { padding: 20px; }
    label { display: block; margin: 0 0 6px; color: #555; font-weight: 500; }
    input[type="number"] {
      width: 100%;
      padding: 10px;
      font-size: 1.1rem;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 14px;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px 0;
      transition: 0.2s;
    }
    #addBtn { background: var(--primary); color: white; }
    #addBtn:hover { background: var(--primary-dark); }
    .reset-area { display: flex; gap: 12px; }
    #manualResetBtn { background: var(--danger); color: white; flex: 1; }
    #infoBtn { background: var(--success); color: white; flex: 1; }
    #lastReset { text-align: center; margin-top: 20px; color: #666; font-size: 0.95rem; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>تتبع شرب الماء</h1>
    <div class="progress-circle">
      <svg viewBox="0 0 100 100">
        <circle class="bg" cx="50" cy="50" r="45"></circle>
        <circle class="progress" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"></circle>
      </svg>
      <div class="percentage">0%</div>
    </div>
    <div class="current-drunk">
      شربت حتى الآن: <span class="liters" id="currentLiters">0.00</span> لتر
      <div id="currentMl" style="font-size:1rem; opacity:0.9;">(0 مل)</div>
    </div>
  </div>

  <div class="content">
    <label>الهدف اليومي (لتر)</label>
    <input type="number" id="goalInput" step="0.1" min="0.5" value="4">

    <label>كمية الإضافة لكل ضغطة (مل)</label>
    <input type="number" id="addAmountInput" step="50" min="50" value="200">

    <button id="addBtn">+ أضف 200 مل</button>

    <div class="reset-area">
      <button id="manualResetBtn">تصفير الآن</button>
      <button id="infoBtn">معلومات التصفير</button>
    </div>

    <div id="lastReset">آخر تصفير: —</div>
  </div>
</div>

<script>
// انتظر تحميل الصفحة كاملة قبل ربط الأحداث
document.addEventListener('DOMContentLoaded', function() {

  // العناصر
  const currentLitersEl = document.getElementById('currentLiters');
  const currentMlEl     = document.getElementById('currentMl');
  const percentageEl    = document.querySelector('.percentage');
  const progressEl      = document.querySelector('.progress');
  const goalInput       = document.getElementById('goalInput');
  const addAmountInput  = document.getElementById('addAmountInput');
  const addBtn          = document.getElementById('addBtn');
  const manualResetBtn  = document.getElementById('manualResetBtn');
  const infoBtn         = document.getElementById('infoBtn');
  const lastResetEl     = document.getElementById('lastReset');

  let current = parseInt(localStorage.getItem('waterCurrent') || '0');
  let goal    = parseFloat(localStorage.getItem('waterGoal') || '4');
  let addAmt  = parseInt(localStorage.getItem('waterAddAmt') || '200');
  let lastReset = parseInt(localStorage.getItem('waterLastReset') || Date.now());

  const DAY_MS = 24 * 60 * 60 * 1000;

  function saveData() {
    localStorage.setItem('waterCurrent', current);
    localStorage.setItem('waterGoal', goal);
    localStorage.setItem('waterAddAmt', addAmt);
    localStorage.setItem('waterLastReset', lastReset);
  }

  function updateDisplay() {
    const liters = (current / 1000).toFixed(2);
    currentLitersEl.textContent = liters;
    currentMlEl.textContent = `(${current} مل)`;

    const percent = Math.min((current / (goal * 1000)) * 100, 100);
    percentageEl.textContent = Math.round(percent) + '%';

    const offset = 283 - (283 * percent / 100);
    progressEl.style.strokeDashoffset = offset;

    // تحديث نص الزر
    addBtn.textContent = `+ أضف ${addAmt} مل`;

    // آخر تصفير
    if (lastReset) {
      const d = new Date(lastReset);
      lastResetEl.textContent = `آخر تصفير: ${d.toLocaleString('ar-SA', {dateStyle:'medium', timeStyle:'short'})}`;
    }

    saveData();
  }

  function checkReset() {
    if (Date.now() - lastReset >= DAY_MS) {
      current = 0;
      lastReset = Date.now();
      updateDisplay();
    }
  }

  // ربط الأحداث
  addBtn.addEventListener('click', () => {
    current += addAmt;
    updateDisplay();
  });

  goalInput.addEventListener('input', () => {
    goal = parseFloat(goalInput.value) || 4;
    if (goal < 0.5) goal = 0.5;
    goalInput.value = goal;
    updateDisplay();
  });

  addAmountInput.addEventListener('input', () => {
    addAmt = parseInt(addAmountInput.value) || 200;
    if (addAmt < 50) addAmt = 50;
    addAmountInput.value = addAmt;
    updateDisplay();
  });

  manualResetBtn.addEventListener('click', () => {
    if (confirm('تصفير التقدم الآن؟ سيبدأ العد الجديد من 24 ساعة')) {
      current = 0;
      lastReset = Date.now();
      updateDisplay();
    }
  });

  infoBtn.addEventListener('click', () => {
    alert(`التصفير التلقائي يحصل بعد 24 ساعة من آخر تصفير.\nآخر تصفير: ${lastResetEl.textContent.replace('آخر تصفير: ','')}`);
  });

  // بداية التشغيل
  checkReset();
  goalInput.value = goal;
  addAmountInput.value = addAmt;
  updateDisplay();

  // فحص كل 5 دقائق إذا بقي المتصفح مفتوح
  setInterval(checkReset, 5 * 60 * 1000);
});
</script>
</body>
</html>
